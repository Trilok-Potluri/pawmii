name: EAS Build — Android

on:
  push:
    branches:
      - main
    paths:
      - 'apps/mobile/**'
      - 'packages/shared/**'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build-android:
    name: EAS Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Inject Firebase config
        run: |
          mkdir -p .config
          echo '${{ secrets.FIREBASE_CONFIG_JSON }}' > .config/config.json
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > .config/google-services.json
          node scripts/setup.js

      - name: Build Android
        working-directory: apps/mobile
        run: |
          eas build --platform android --profile ${{ github.event.inputs.profile || 'preview' }} --non-interactive
