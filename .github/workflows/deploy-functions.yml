name: Deploy — Firebase

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - 'packages/shared/**'
      - 'firestore.rules'
      - 'firestore.indexes.json'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Cloud Functions + Firestore Rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run shared:build

      - name: Build functions
        run: npm run functions:build

      - name: Deploy functions + Firestore rules + indexes
        run: |
          npx firebase-tools deploy \
            --only functions,firestore:rules,firestore:indexes \
            --project pawmii-app \
            --token ${{ secrets.FIREBASE_TOKEN }} \
            --non-interactive
